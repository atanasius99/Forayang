<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Ayangg</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>❤️</text></svg>">
</head>

<body>

<audio id="bgm" loop>
  <source src="music/lagu.mp3" type="audio/mpeg">
</audio>

<div class="bg"></div>
<canvas id="particles"></canvas>

<div class="app">

<!-- ENVELOPE -->
<div id="envelope">
  <div class="flap"></div>
  <div class="letter">For Ayangg</div>
</div>

<!-- MAIN -->
<div id="main" class="hidden">

  <h1 class="title">Santi Hayuning Putri</h1>

  <button id="startBtn">Start</button>

  <div id="quiz" class="hidden">
    <h2 id="question"></h2>
    <div class="answers">
      <button class="ans">Yes</button>
      <button class="ans">No</button>
    </div>
    <p id="feedback"></p>
  </div>

  <div id="message" class="hidden"></div>

  <div id="gallery">
    <img src="img/foto1.jpeg">
    <img src="img/foto2.jpeg">
    <img src="img/foto3.jpeg">
    <img src="img/foto5.jpeg">
  </div>

</div>

</div>

<script src="script.js"></script>
</body>
</html>
